name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Build NoteFlow ──────────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Build NoteFlow
        run: |
          cd "笔记系统项目/noteflow"
          npm ci
          npm run build

      # ── Build Self-Discipline-Quest ─────────────────────
      - name: Install & Build Self-Discipline-Quest
        run: |
          cd "自律-游戏化人生项目/self-discipline-quest"
          npm ci
          npm run build

      # ── Merge into one dist ─────────────────────────────
      - name: Merge dist folders
        run: |
          mkdir -p merged
          cp -r "笔记系统项目/noteflow/dist/." merged/
          mkdir -p "merged/self-discipline-quest"
          cp -r "自律-游戏化人生项目/self-discipline-quest/dist/." "merged/self-discipline-quest/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: merged

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
