<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Create New Task | Kinetic Scholar</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-container-low": "#f0f1f1",
                    "surface-container-high": "#e1e3e3",
                    "secondary-fixed": "#ece856",
                    "surface-container-highest": "#dbdddd",
                    "secondary-container": "#ece856",
                    "tertiary-fixed": "#d7f874",
                    "on-secondary-fixed-variant": "#605e00",
                    "background": "#f6f6f6",
                    "outline": "#767777",
                    "primary-container": "#fddc00",
                    "on-tertiary-fixed": "#3a4a00",
                    "tertiary": "#4e6300",
                    "on-secondary": "#fcf964",
                    "on-primary": "#fff3c5",
                    "tertiary-dim": "#445600",
                    "on-primary-fixed-variant": "#665800",
                    "primary-fixed-dim": "#edce00",
                    "on-error": "#ffefec",
                    "surface-tint": "#6a5b00",
                    "inverse-surface": "#0c0f0f",
                    "surface": "#f6f6f6",
                    "primary-dim": "#5c4f00",
                    "on-secondary-fixed": "#434100",
                    "primary-fixed": "#fddc00",
                    "surface-bright": "#f6f6f6",
                    "tertiary-fixed-dim": "#c9ea68",
                    "error-dim": "#b92902",
                    "tertiary-container": "#d7f874",
                    "surface-container-lowest": "#ffffff",
                    "on-tertiary": "#e1ff87",
                    "on-surface-variant": "#5a5c5c",
                    "on-tertiary-fixed-variant": "#536900",
                    "on-background": "#2d2f2f",
                    "on-primary-container": "#5b4e00",
                    "on-primary-fixed": "#463b00",
                    "on-error-container": "#520c00",
                    "error-container": "#f95630",
                    "secondary": "#605e00",
                    "secondary-dim": "#545200",
                    "primary": "#6a5b00",
                    "on-surface": "#2d2f2f",
                    "inverse-primary": "#fddc00",
                    "surface-variant": "#dbdddd",
                    "surface-container": "#e7e8e8",
                    "inverse-on-surface": "#9c9d9d",
                    "surface-dim": "#d3d5d5",
                    "on-secondary-container": "#565400",
                    "error": "#b02500",
                    "secondary-fixed-dim": "#ddda49",
                    "on-tertiary-container": "#4a5e00",
                    "outline-variant": "#acadad"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Inter"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #dbdddd;
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen relative overflow-hidden">
<!-- Mock Background Dashboard (Dimmed) -->
<div class="fixed inset-0 z-0 opacity-40 blur-sm pointer-events-none p-8 flex flex-col gap-6">
<header class="flex justify-between items-center">
<div class="h-8 w-48 bg-surface-container-highest rounded-full"></div>
<div class="flex gap-4">
<div class="h-10 w-10 bg-surface-container-highest rounded-full"></div>
<div class="h-10 w-10 bg-surface-container-highest rounded-full"></div>
</div>
</header>
<div class="grid grid-cols-3 gap-6 flex-1">
<div class="col-span-2 bg-surface-container-lowest rounded-xl p-6 shadow-sm flex flex-col gap-4">
<div class="h-6 w-1/3 bg-surface-container-highest rounded-full"></div>
<div class="space-y-3">
<div class="h-16 w-full bg-surface-container rounded-lg"></div>
<div class="h-16 w-full bg-surface-container rounded-lg"></div>
<div class="h-16 w-full bg-surface-container rounded-lg"></div>
</div>
</div>
<div class="bg-surface-container-lowest rounded-xl p-6 shadow-sm flex flex-col gap-4">
<div class="h-6 w-1/2 bg-surface-container-highest rounded-full"></div>
<div class="h-48 w-full bg-surface-container rounded-lg"></div>
</div>
</div>
</div>
<!-- Modal Overlay -->
<div class="fixed inset-0 z-50 bg-inverse-surface/10 backdrop-blur-md flex items-center justify-center p-4">
<!-- Modal Container -->
<main class="bg-surface-container-lowest w-full max-w-2xl rounded-2xl shadow-[0_20px_40px_rgba(106,91,0,0.06)] overflow-hidden flex flex-col max-h-[921px]">
<!-- Header -->
<header class="px-8 py-6 flex items-center justify-between">
<div>
<h1 class="text-2xl font-black tracking-tighter text-on-surface">New Task Focus</h1>
<p class="text-sm text-on-surface-variant font-medium mt-1">Design your next productivity sprint</p>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container transition-colors text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</header>
<!-- Scrollable Content -->
<div class="px-8 pb-8 flex-1 overflow-y-auto custom-scrollbar">
<div class="flex flex-col gap-8">
<!-- Task Title Input -->
<section class="flex flex-col gap-2">
<label class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant px-1" for="task-title">Task Title</label>
<input class="w-full text-xl font-bold border-none focus:ring-0 p-0 text-on-surface placeholder:text-surface-container-highest bg-transparent" id="task-title" placeholder="What needs to be accomplished?" type="text"/>
<div class="h-0.5 w-full bg-surface-container-high rounded-full overflow-hidden">
<div class="h-full w-1/3 bg-primary-container"></div>
</div>
</section>
<!-- Row: Due Date & XP Reward -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<section class="flex flex-col gap-2">
<label class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant px-1">Due Date</label>
<div class="flex items-center gap-3 px-4 py-3 bg-surface-container rounded-xl text-on-surface hover:bg-surface-container-high transition-colors cursor-pointer group">
<span class="material-symbols-outlined text-primary" data-icon="calendar_today">calendar_today</span>
<span class="font-semibold text-sm">March 14, 2024</span>
<span class="material-symbols-outlined text-on-surface-variant ml-auto group-hover:translate-y-0.5 transition-transform" data-icon="expand_more">expand_more</span>
</div>
</section>
<section class="flex flex-col gap-2">
<label class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant px-1">XP Reward</label>
<div class="relative group">
<input class="w-full px-4 py-3 bg-surface-container-low border-2 border-transparent focus:border-primary-container rounded-xl font-black text-on-surface-variant focus:ring-0 transition-all" type="number" value="250"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2 flex items-center gap-1.5 bg-primary-container px-3 py-1 rounded-full text-[10px] font-black">
<span class="material-symbols-outlined text-[14px]" data-icon="workspace_premium" style="font-variation-settings: 'FILL' 1;">workspace_premium</span>
                                    + XP
                                </div>
</div>
</section>
</div>
<!-- Priority Selection -->
<section class="flex flex-col gap-3">
<label class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant px-1">Priority Level</label>
<div class="grid grid-cols-3 gap-3 p-1.5 bg-surface-container rounded-2xl">
<button class="py-2.5 px-4 rounded-xl text-sm font-bold transition-all text-on-surface-variant hover:bg-surface-container-high">Low</button>
<button class="py-2.5 px-4 rounded-xl text-sm font-bold transition-all bg-surface-container-lowest text-on-surface shadow-sm ring-1 ring-black/5">Medium</button>
<button class="py-2.5 px-4 rounded-xl text-sm font-bold transition-all text-on-surface-variant hover:bg-surface-container-high">High</button>
</div>
</section>
<!-- Skill Tags -->
<section class="flex flex-col gap-3">
<label class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant px-1">Category / Skill Tag</label>
<div class="flex flex-wrap gap-2">
<span class="inline-flex items-center gap-2 px-4 py-2 bg-tertiary-container text-on-tertiary-container rounded-full text-xs font-black ring-1 ring-tertiary/10">
                                Mathematics
                                <span class="material-symbols-outlined text-[16px] cursor-pointer" data-icon="close">close</span>
</span>
<span class="inline-flex items-center gap-2 px-4 py-2 bg-secondary-container text-on-secondary-container rounded-full text-xs font-black ring-1 ring-secondary/10">
                                Research
                                <span class="material-symbols-outlined text-[16px] cursor-pointer" data-icon="close">close</span>
</span>
<button class="inline-flex items-center gap-1.5 px-4 py-2 border-2 border-dashed border-outline-variant text-on-surface-variant rounded-full text-xs font-bold hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-[16px]" data-icon="add">add</span>
                                Add Skill
                            </button>
</div>
</section>
<!-- Estimated Focus Time -->
<section class="flex flex-col gap-4">
<div class="flex justify-between items-center px-1">
<label class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">Estimated Focus Time</label>
<span class="text-sm font-black text-primary">45 <span class="text-[10px] text-on-surface-variant font-medium">MINS</span></span>
</div>
<div class="relative h-2 w-full bg-surface-container rounded-full">
<div class="absolute h-full w-3/4 bg-gradient-to-r from-primary to-primary-container rounded-full shadow-[0_0_8px_rgba(106,91,0,0.2)]"></div>
<div class="absolute top-1/2 left-3/4 -translate-y-1/2 w-5 h-5 bg-surface-container-lowest rounded-full border-4 border-primary shadow-lg cursor-pointer"></div>
</div>
<div class="flex justify-between text-[10px] font-bold text-outline-variant">
<span>15m</span>
<span>30m</span>
<span>45m</span>
<span>60m</span>
<span>90m+</span>
</div>
</section>
<!-- Notes -->
<section class="flex flex-col gap-2">
<label class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant px-1" for="notes">Focus Notes</label>
<textarea class="w-full p-4 bg-surface-container-low border-none focus:ring-2 focus:ring-primary-container/30 rounded-xl text-sm font-medium text-on-surface placeholder:text-outline/50 resize-none" id="notes" placeholder="Break down your approach or list specific requirements..." rows="4"></textarea>
</section>
</div>
</div>
<!-- Footer / Action Area -->
<footer class="p-6 bg-surface-container-low/50 border-t border-surface-container flex gap-3">
<button class="flex-1 py-4 bg-surface-container-high text-on-surface rounded-full text-sm font-black tracking-wide hover:bg-surface-container-highest transition-all active:scale-95">
                    Discard Task
                </button>
<button class="flex-[2] py-4 bg-gradient-to-br from-primary to-primary-container text-on-primary-container rounded-full text-sm font-black tracking-wide shadow-[0_10px_20px_rgba(106,91,0,0.15)] hover:shadow-[0_15px_30px_rgba(106,91,0,0.2)] transition-all active:scale-95 flex items-center justify-center gap-2 group">
<span class="material-symbols-outlined text-[20px]" data-icon="bolt" style="font-variation-settings: 'FILL' 1;">bolt</span>
                    Create Task
                </button>
</footer>
</main>
<!-- Floating Hint (Glassmorphism) -->
<div class="fixed bottom-10 left-1/2 -translate-x-1/2 px-6 py-3 bg-white/70 backdrop-blur-xl border border-white/20 rounded-full shadow-2xl flex items-center gap-3">
<div class="w-2 h-2 rounded-full bg-primary animate-pulse"></div>
<p class="text-xs font-bold text-on-surface-variant tracking-tight">Completing this will grant you <span class="text-primary font-black">Level 15 Scholar</span> status.</p>
</div>
</div>
</body></html>
