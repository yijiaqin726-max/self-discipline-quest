name: Deploy NoteFlow to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - '笔记系统项目/noteflow/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: 笔记系统项目/noteflow/package-lock.json

      - name: Install dependencies
        working-directory: 笔记系统项目/noteflow
        run: npm ci

      - name: Build
        working-directory: 笔记系统项目/noteflow
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 笔记系统项目/noteflow/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
